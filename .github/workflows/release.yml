name: release

# Builds distributable Nexo desktop artifacts on demand or on a version tag.
# Artifacts are uploaded to the workflow run; publishing a release is a separate
# manual step (see docs/release-checklist.md). The core transfer engine is not
# modified by packaging.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Build Tauri bundles (AppImage + deb)
        working-directory: apps/desktop
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npx tauri build --bundles appimage deb

      - name: Collect artifacts
        run: |
          mkdir -p dist-artifacts
          cp target/release/bundle/appimage/*.AppImage dist-artifacts/Nexo-linux.AppImage || true
          cp target/release/bundle/deb/*.deb dist-artifacts/Nexo-linux.deb || true
          ls -la dist-artifacts

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexo-linux
          path: dist-artifacts/*
          if-no-files-found: error

  windows:
    name: Windows (MSI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Build Tauri MSI
        working-directory: apps/desktop
        run: npx tauri build --bundles msi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # Installer (recommended for normal users).
          cp target/release/bundle/msi/*.msi dist-artifacts/Nexo-windows.msi || true
          # Portable single executable (no install; requires WebView2). Tauri
          # names the raw binary after the Cargo [[bin]] (nexo-desktop); ship it
          # as Nexo-portable.exe.
          cp target/release/nexo-desktop.exe dist-artifacts/Nexo-portable.exe || true
          ls -la dist-artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexo-windows
          path: dist-artifacts/*
          if-no-files-found: error
